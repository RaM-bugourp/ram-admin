# ===========================================
# ram-admin Docker Compose 配置
# ===========================================

version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ram-admin-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_DB_ENGINE=django.db.backends.postgresql
      - DJANGO_DB_NAME=ram_admin
      - DJANGO_DB_USER=postgres
      - DJANGO_DB_PASSWORD=postgres
      - DJANGO_DB_HOST=db
      - DJANGO_DB_PORT=5432
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ram-admin-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ram-admin-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ram-admin-network

  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: ram-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ram_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ram-admin-network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: ram-admin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ram-admin-network

volumes:
  postgres-data:

networks:
  ram-admin-network:
    driver: bridge
